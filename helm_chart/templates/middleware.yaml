{{- if and .Values.ingress.enabled (eq .Values.ingress.controllerType "traefik") .Values.ingress.traefik.middleware.enabled }}
{{- range $name, $mw := .Values.ingress.traefik.middleware.definitions }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace | default $.Release.Namespace }}
spec:
{{- toYaml $mw.spec | nindent 2 }}
---
{{- end }}
{{- end }}
