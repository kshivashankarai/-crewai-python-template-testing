apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "#RELEASE_NAME#.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "#RELEASE_NAME#.name" . }}
    helm.sh/chart: {{ include "#RELEASE_NAME#.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
{{ toYaml .Values.updateStrategy | indent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "#RELEASE_NAME#.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "#RELEASE_NAME#.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        releaseTime: {{ dateInZone "2006-01-02 15:04:05Z" (now) "UTC"| quote }}
{{- if .Values.vault }}
  {{- if eq .Values.vault.type "vault" }}
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: {{ .Values.vault.role }}
      {{- range .Values.vault.secretPath }}
        vault.hashicorp.com/agent-inject-secret-{{ .fileName}}: {{ .path }}
      {{- end }}
  {{- end }}
{{- end }}
    spec:
{{- if .Values.vault }}
      serviceAccountName: {{ .Values.vault.serviceAccount }}
      automountServiceAccountToken: true
{{- else if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      automountServiceAccountToken: {{ .Values.mountServiceAccountToken }}
{{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.image.registrySecret }}
      imagePullSecrets:
        - name: {{ .Values.image.registrySecret | quote }}
{{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          env:
            - name: CONTEXT
              value: {{ .Values.context | quote }}
            - name: PORT
              value: "{{ .Values.service.internalport }}"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          # volumeMounts:
          #   - name: efs-pvc
          #     mountPath: ./src/main/resources
          ports:
            - name: http
              containerPort: {{ .Values.service.internalport }}
              protocol: TCP
          {{- with .Values.extraPorts }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- if or .Values.tmpDir.enabled .Values.volumes.mounts.enabled }}
          volumeMounts:
          {{- if .Values.tmpDir.enabled }}
            - name: tmp
              mountPath: /tmp
          {{- end }}
          {{- if .Values.volumes.mounts.enabled }}
          {{- with .Values.volumes.mounts.data }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
{{- end }}

          {{- with .Values.probes.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- if or .Values.tmpDir.enabled .Values.volumes.enabled }}
      volumes:
      {{- if .Values.tmpDir.enabled }}
        - name: tmp
          emptyDir:
            {{- if or .Values.tmpDir.medium .Values.tmpDir.sizeLimit }}
            {{- if .Values.tmpDir.medium }}
            medium: {{ .Values.tmpDir.medium }}
            {{- end }}
            {{- if .Values.tmpDir.sizeLimit }}
            sizeLimit: {{ .Values.tmpDir.sizeLimit }}
            {{- end }}
            {{- else }}
            {}
            {{- end }}
      {{- end }}
      {{- if .Values.volumes.enabled }}
      {{- with .Values.volumes.data }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
{{- end }}
      # volumes:
      #   - name: efs-pvc
      #     persistentVolumeClaim:
      #     claimName: efs
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
